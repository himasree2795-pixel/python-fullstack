{% extends "base.html" %}

{% block content %}
<h1>Book List</h1>

{% for book in books %}
    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>{{ book.title }}</h3>
        <p><strong>Author:</strong> {{ book.author }}</p>
        <p>{{ book.description }}</p>

        <a href="{% url 'book_detail' book.id %}">View Details</a>
    </div>
{% empty %}
    <p>No books available.</p>
{% endfor %}

{% endblock %}
